<svg xmlns="http://www.w3.org/2000/svg" width="680" height="330" viewBox="0 0 680 330" role="img">
<title>The consent firewall</title>
<desc>Every item is held in the private repository dark by default. A one-way publish step copies only published items to the public site; held items stop at the gate and have no representation there, and a redacted item crosses as its redacted public copy.</desc>
<style>
  .title{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px;font-weight:500;fill:#2C2C2A}
  .gate{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:14px;font-weight:500;fill:#2C2C2A}
  .sub{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;font-weight:400;fill:#5F5E5A}
  .gid{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;font-weight:400;fill:#27500A}
  .aid{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;font-weight:400;fill:#633806}
  .note{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;font-weight:400;fill:#57534C}
  .box-gray{fill:#F1EFE8;stroke:#B4B2A9;stroke-width:0.5}
  .box-green{fill:#EAF3DE;stroke:#639922;stroke-width:0.5}
  .box-amber{fill:#FAEEDA;stroke:#BA7517;stroke-width:0.5}
</style>
<defs>
  <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#444441"/></marker>
</defs>

<rect class="box-gray" x="40" y="60" width="250" height="216" rx="20"/>
<text class="title" x="60" y="86">Private repo</text>
<text class="sub" x="60" y="104">catalog.db · dark by default</text>

<rect class="box-green" x="60" y="118" width="200" height="30" rx="8"/>
<text class="gid" x="76" y="133" dominant-baseline="central">wick-01</text>
<rect class="box-green" x="60" y="156" width="200" height="30" rx="8"/>
<text class="gid" x="76" y="171" dominant-baseline="central">letter-vane-1912</text>
<rect class="box-amber" x="60" y="194" width="200" height="30" rx="8"/>
<text class="aid" x="76" y="209" dominant-baseline="central">letter-quill-1913</text>
<rect class="box-amber" x="60" y="232" width="200" height="30" rx="8"/>
<text class="aid" x="76" y="247" dominant-baseline="central">letter-counsel-1914</text>

<text class="gate" x="340" y="102" text-anchor="middle">publish.sh</text>
<line x1="340" y1="116" x2="340" y2="264" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 4"/>

<line x1="260" y1="133" x2="410" y2="133" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="260" y1="171" x2="410" y2="171" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<line x1="260" y1="209" x2="330" y2="209" stroke="#854F0B" stroke-width="1.5"/>
<line x1="331" y1="204" x2="341" y2="214" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
<line x1="341" y1="204" x2="331" y2="214" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
<line x1="260" y1="247" x2="330" y2="247" stroke="#854F0B" stroke-width="1.5"/>
<line x1="331" y1="242" x2="341" y2="252" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>
<line x1="341" y1="242" x2="331" y2="252" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round"/>

<rect class="box-gray" x="390" y="60" width="250" height="216" rx="20"/>
<text class="title" x="410" y="86">Public site</text>
<text class="sub" x="410" y="104">bolaurentpapers.org</text>

<rect class="box-green" x="410" y="118" width="200" height="30" rx="8"/>
<text class="gid" x="426" y="133" dominant-baseline="central">wick-01</text>
<rect class="box-green" x="410" y="156" width="200" height="30" rx="8"/>
<text class="gid" x="426" y="171" dominant-baseline="central">letter-vane-1912</text>
<rect x="546" y="167" width="26" height="8" rx="2" fill="#3B6D11"/>
<rect x="578" y="167" width="16" height="8" rx="2" fill="#3B6D11"/>

<rect x="410" y="196" width="200" height="66" rx="8" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
<text class="note" x="510" y="221" text-anchor="middle">held items don't exist here</text>
<text class="note" x="510" y="240" text-anchor="middle">no row · no file · no url</text>

<rect class="box-green" x="40" y="300" width="12" height="12" rx="3"/>
<text class="note" x="58" y="310">published — crosses</text>
<rect class="box-amber" x="210" y="300" width="12" height="12" rx="3"/>
<text class="note" x="228" y="310">held — stays dark</text>
<rect x="360" y="302" width="18" height="8" rx="2" fill="#3B6D11"/>
<text class="note" x="384" y="310">content redacted</text>
</svg>
