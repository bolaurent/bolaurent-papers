project:
  type: website
  output-dir: docs
  resources:
    - CNAME

date-format: "YYYY-MM-DD"        # ← global default for all dates

website:
  title: "Bo Laurent Papers"
  site-url: https://bolaurentpapers.org
  favicon: images/favicon.svg
  open-graph: true
  twitter-card: true
  navbar:
    pinned: true
    left:
      - href: index.qmd
        text: Home
      - href: updates.qmd
        text: Recent additions
      - href: about.qmd
        text: About the collection
    right:
      - icon: rss
        href: updates.xml
  page-footer:
    left: "© Bo Laurent 2026"
    center: "Physical materials held at The [Kinsey Institute Library](https://kinseyinstitute.org/collections)"
    right: "[No cookies. No tracking of individuals.](privacy.qmd)"

format:
  html:
    theme:
      - litera
      - theme.scss
      - custom.scss
    toc: true
    toc-depth: 3
    grid:
      sidebar-width: 250px
      body-width: 820px
    css: styles.css
    include-in-header:
      text: |
        <script data-goatcounter="https://bolaurentpapers.goatcounter.com/count"
                async src="//gc.zgo.at/count.js"></script>
